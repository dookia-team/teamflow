# 백엔드 Docker 이미지 빌드 + GHCR 푸시
#
# 목적: 프론트엔드 개발자가 JVM 없이 `docker compose pull && up` 한 방으로
#       전체 백엔드 스택(Postgres + Redis + API)을 로컬에서 띄울 수 있게 한다.
#
# 이미지: ghcr.io/dookia-team/teamflow-backend
# 태그 규칙:
#   - main    → latest, main, <short-sha>
#   - sprint2 → sprint2, <short-sha>
#   - develop → develop, <short-sha>
#   - 수동 실행(workflow_dispatch) → 해당 브랜치명 + <short-sha>

name: build-backend-image

on:
  push:
    branches: [main, sprint2, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/build-backend-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/teamflow-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
