server:
  port: 8082

spring:
  application:
    name: teamflow-api
  datasource:
    url: jdbc:postgresql://localhost:5432/teamflow
    username: ${DB_USER:teamflow}
    password: ${DB_PASSWORD:teamflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

# OpenAPI / Swagger UI (Apidog import 대상)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  paths-to-match: /api/**

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256}
    access-token-ttl-seconds: 900         # 15분 (auth-design §2.1)
    refresh-token-ttl-seconds: 604800     # 7일  (auth-design §2.2)
  google-oauth:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token

---
# 로컬 개발 프로파일
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
