# 프론트엔드 개발자용 — JVM/Gradle 없이 백엔드 전체 스택 기동
#
# 사용 방법:
#   1) Docker Desktop 설치 (JDK, Gradle, 백엔드 소스 모두 불필요)
#   2) 이 파일을 임의 디렉토리에 저장 (파일 하나만 있으면 됨)
#   3) 인증:
#        GHCR 이미지가 private 이면 — 개인 GitHub PAT(classic, scope: read:packages) 로 로그인
#          docker login ghcr.io -u <github-username>
#        이미지가 public 이면 — 로그인 불필요
#   4) 실행:
#        docker compose -f docker-compose.frontend.yml pull
#        docker compose -f docker-compose.frontend.yml up -d
#
# 확인 URL:
#   - Swagger UI : http://localhost:8082/swagger-ui.html
#   - Health     : http://localhost:8082/actuator/health
#
# 종료 / 초기화:
#   docker compose -f docker-compose.frontend.yml down        # 중지 (데이터 유지)
#   docker compose -f docker-compose.frontend.yml down -v     # 중지 + 볼륨 삭제 (마이그레이션 재적용)
#
# 최신 백엔드 반영:
#   docker compose -f docker-compose.frontend.yml pull
#   docker compose -f docker-compose.frontend.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: teamflow-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: teamflow
      POSTGRES_PASSWORD: teamflow
      POSTGRES_DB: teamflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamflow -d teamflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: teamflow-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    # CI 에서 빌드·푸시된 사전 빌드 이미지
    # 태그 선택:
    #   - latest   : main 브랜치 최신
    #   - sprint2  : sprint2 브랜치 최신
    #   - develop  : develop 브랜치 최신
    #   - sha-xxx  : 특정 커밋 고정
    image: ghcr.io/dookia-team/teamflow-backend:${BACKEND_IMAGE_TAG:-sprint2}
    container_name: teamflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8082}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATASOURCE_URL: postgresql://postgres:5432/teamflow
      DB_USER: teamflow
      DB_PASSWORD: teamflow
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_SSL: "false"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      JWT_SECRET: "${JWT_SECRET:-local-dev-only-secret-at-least-256-bits-long-for-hs256-placeholder}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      JWT_COOKIE_SAME_SITE: "Lax"
      JWT_COOKIE_SECURE: "false"

volumes:
  postgres-data:
  redis-data:
